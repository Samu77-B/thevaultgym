# Decap CMS — JSON overlays merged at build time with generated Webflow HTML.
# Use GitHub OAuth (Cloudflare-friendly). Create a GitHub OAuth App + enable the
# Decap "Authorization callback URL". See CLOUDFLARE.md.

backend:
  name: github
  repo: Samu77-B/thevaultgym
  branch: master

# For local-only editing: run `npx decap-server` from the repo root, then uncomment:
# local_backend: true

# Stored under repo-root images/ so `npm run sync-public` copies into the built site.
media_folder: images/uploads
public_folder: /images/uploads

collections:
  - name: pages
    label: Pages
    folder: src/content/pages
    extension: json
    format: json
    create: true
    slug: "{{slug}}"
    identifier_field: slug
    fields:
      - { label: Slug, name: slug, widget: string, hint: "Must match file name without .json (e.g. about, services-boxing)" }
      - label: SEO
        name: seo
        widget: object
        collapsed: true
        fields:
          - { label: Title, name: title, widget: string, required: false }
          - { label: Meta description, name: description, widget: text, required: false }
          - { label: Keywords, name: keywords, widget: string, required: false }
          - { label: Robots, name: robots, widget: string, required: false }
          - { label: OG title, name: ogTitle, widget: string, required: false }
          - { label: OG description, name: ogDescription, widget: text, required: false }
          - { label: OG type, name: ogType, widget: string, required: false }
          - { label: OG URL, name: ogUrl, widget: string, required: false }
          - { label: OG image (path), name: ogImage, widget: string, required: false, hint: "e.g. /images/webclip.png" }
          - { label: Twitter title, name: twitterTitle, widget: string, required: false }
          - { label: Twitter description, name: twitterDescription, widget: text, required: false }
          - { label: Twitter card, name: twitterCard, widget: string, required: false }
      - { label: JSON-LD override, name: jsonLd, widget: text, required: false }
      - { label: Head CSS override, name: headStyles, widget: text, required: false }
      - { label: Body HTML override, name: bodyMarkup, widget: text, required: false }
